<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethercore Apex-991 | Full Logic OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --case: #2c2e30;
            --lcd: #9db299;
            --btn-num: #efefef;
            --btn-dark: #3a3a3a;
            --btn-action: #d35400;
            --shift: #f1c40f;
            --alpha: #e74c3c;
        }

        body { background: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Consolas', monospace; }
        
        .calculator {
            background: var(--case);
            width: 420px;
            padding: 25px;
            border-radius: 25px 25px 60px 60px;
            box-shadow: 0 20px 0 #111, 0 40px 80px rgba(0,0,0,0.8);
        }

        .screen {
            background: var(--lcd);
            height: 110px;
            border: 5px solid #111;
            border-radius: 6px;
            padding: 10px;
            color: #1a1a1a;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        #line-in { font-size: 20px; height: 50px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid rgba(0,0,0,0.1); }
        #line-out { font-size: 30px; text-align: right; font-weight: bold; margin-top: 5px; }

        .brand { color: white; margin-bottom: 10px; font-weight: bold; border-left: 5px solid var(--alpha); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .btn-w { position: relative; padding-top: 14px; }
        .s-lbl { position: absolute; top: 0; left: 2px; color: var(--shift); font-size: 8px; font-weight: bold; }
        .a-lbl { position: absolute; top: 0; right: 2px; color: var(--alpha); font-size: 8px; font-weight: bold; }

        button {
            width: 100%; height: 38px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
            box-shadow: 0 3px 0 #000; font-size: 11px; transition: 0.1s;
        }

        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
        .num { background: var(--btn-num); color: #222; font-size: 16px; height: 45px; }
        .fn { background: var(--btn-dark); color: #fff; }
        .act { background: var(--btn-action); color: #fff; height: 45px; }
        .eq { background: #fff; color: #000; grid-column: span 2; height: 45px; font-size: 18px; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="brand">AETHERCORE <span style="color:var(--alpha)">CLASSWIZ</span></div>
    
    <div class="screen">
        <div id="indicators" style="font-size: 10px; height: 12px;">D</div>
        <div id="line-in"></div>
        <div id="line-out">0</div>
    </div>

    <div class="grid">
        <button class="fn" onclick="setMode('shift')" id="s-btn">SHIFT</button>
        <button class="fn" onclick="setMode('alpha')" id="a-btn" style="color:var(--alpha)">ALPHA</button>
        <button class="fn">OPTN</button>
        <button class="fn">MENU</button>
        <button class="fn" onclick="back()">DEL</button>
        <button class="fn" onclick="reset()" style="color:var(--btn-action)">AC</button>

        <div class="btn-w"><span class="s-lbl">x!</span><button class="fn" onclick="press('inv')">x⁻¹</button></div>
        <div class="btn-w"><span class="s-lbl">nCr</span><button class="fn" onclick="press('/')">□/□</button></div>
        <div class="btn-w"><span class="s-lbl">∛</span><button class="fn" onclick="press('sqrt')">√</button></div>
        <div class="btn-w"><span class="s-lbl">x³</span><button class="fn" onclick="press('sq')">x²</button></div>
        <div class="btn-w"><span class="s-lbl">10ˣ</span><button class="fn" onclick="press('pow')">x□</button></div>
        <div class="btn-w"><span class="s-lbl">eˣ</span><button class="fn" onclick="press('log10')">log</button></div>

        <div class="btn-w"><span class="s-lbl">i</span><button class="fn" onclick="press('ln')">ln</button></div>
        <div class="btn-w"><span class="s-lbl">∠</span><span class="a-lbl">A</span><button class="fn" onclick="press('A')">(-)</button></div>
        <div class="btn-w"><span class="s-lbl">FACT</span><span class="a-lbl">B</span><button class="fn" onclick="press('B')">.,,,</button></div>
        <div class="btn-w"><span class="s-lbl">sin⁻¹</span><span class="a-lbl">C</span><button class="fn" onclick="press('sin')">sin</button></div>
        <div class="btn-w"><span class="s-lbl">cos⁻¹</span><span class="a-lbl">D</span><button class="fn" onclick="press('cos')">cos</button></div>
        <div class="btn-w"><span class="s-lbl">tan⁻¹</span><span class="a-lbl">E</span><button class="fn" onclick="press('tan')">tan</button></div>

        <div class="btn-w"><span class="a-lbl">F</span><button class="fn">STO</button></div>
        <div class="btn-w"><button class="fn">ENG</button></div>
        <div class="btn-w"><span class="a-lbl">X</span><button class="fn" onclick="press('(')">(</button></div>
        <div class="btn-w"><span class="a-lbl">Y</span><button class="fn" onclick="press(')')">)</button></div>
        <div class="btn-w"><span class="a-lbl">M</span><button class="fn" onclick="press('conv')">S⇔D</button></div>
        <div class="btn-w"><button class="fn" onclick="press('M+')">M+</button></div>

        <button class="num" onclick="press('7')">7</button>
        <button class="num" onclick="press('8')">8</button>
        <button class="num" onclick="press('9')">9</button>
        <button class="act" onclick="back()">DEL</button>
        <button class="act" onclick="reset()">AC</button>
        <button class="fn" onclick="press('nPr')">nPr</button>

        <button class="num" onclick="press('4')">4</button>
        <button class="num" onclick="press('5')">5</button>
        <button class="num" onclick="press('6')">6</button>
        <button class="num" onclick="press('*')">×</button>
        <button class="num" onclick="press('/')">÷</button>
        <button class="fn" onclick="press('nCr')">nCr</button>

        <button class="num" onclick="press('1')">1</button>
        <button class="num" onclick="press('2')">2</button>
        <button class="num" onclick="press('3')">3</button>
        <button class="num" onclick="press('+')">+</button>
        <button class="num" onclick="press('-')">−</button>
        <button class="fn" onclick="press('pi')">π</button>

        <button class="num" onclick="press('0')">0</button>
        <button class="num" onclick="press('.')">.</button>
        <button class="num" onclick="press('exp')">×10ˣ</button>
        <button class="num" onclick="press('Ans')">Ans</button>
        <button class="eq" onclick="solve()">=</button>
    </div>
</div>

<script>
    const input = document.getElementById('line-in');
    const output = document.getElementById('line-out');
    const ind = document.getElementById('indicators');
    
    let mode = 'normal'; // normal, shift, alpha
    let lastAns = 0;
    
    // Memory Variables (A-F, X, Y, M)
    let variables = { A:0, B:0, C:0, D:0, E:0, F:0, X:0, Y:0, M:0 };

    function setMode(m) {
        mode = (mode === m) ? 'normal' : m;
        ind.innerText = mode === 'shift' ? 'S' : (mode === 'alpha' ? 'A' : 'D');
        updateBtnColors();
    }

    function updateBtnColors() {
        document.getElementById('s-btn').style.background = (mode === 'shift') ? 'var(--shift)' : 'var(--btn-dark)';
        document.getElementById('a-btn').style.background = (mode === 'alpha') ? 'var(--alpha)' : 'var(--btn-dark)';
    }

    function press(key) {
        let textToAdd = "";

        if (mode === 'alpha') {
            // ALPHA MAP
            const alphaMap = { 'A':'A', 'B':'B', 'C':'C', 'D':'D', 'E':'E', 'F':'F', '(':'X', ')':'Y', 'conv':'M' };
            textToAdd = alphaMap[key] || "";
        } else if (mode === 'shift') {
            // SHIFT MAP
            const shiftMap = { 'sin':'asin(', 'cos':'acos(', 'tan':'atan(', 'sqrt':'cbrt(', 'inv':'!', 'sq':'^3', 'pow':'log10(' };
            textToAdd = shiftMap[key] || "";
        } else {
            // NORMAL MAP
            const normalMap = { 
                'sin':'sin(', 'cos':'cos(', 'tan':'tan(', 'sqrt':'sqrt(', 'sq':'^2', 
                'pow':'^', 'ln':'log(', 'log10':'log10(', 'exp':'*10^', 'pi':'pi', 'Ans':'Ans' 
            };
            textToAdd = normalMap[key] || key;
        }

        input.innerText += textToAdd;
        mode = 'normal';
        ind.innerText = 'D';
        updateBtnColors();
    }

    function reset() { input.innerText = ''; output.innerText = '0'; }
    function back() { input.innerText = input.innerText.slice(0, -1); }

    function solve() {
        try {
            let formula = input.innerText;
            formula = formula.replace(/×/g, '*').replace(/÷/g, '/');
            formula = formula.replace(/Ans/g, lastAns);
            
            // Pass the variables object so Math.js can use A, B, X etc.
            const result = math.evaluate(formula, variables);
            lastAns = result;
            output.innerText = math.format(result, { precision: 10 });
        } catch (e) {
            output.innerText = "Syntax ERROR";
        }
    }
</script>
</body>
</html>
