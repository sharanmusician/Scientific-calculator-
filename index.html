<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethercore Interactive | Omega-Phase Calc</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --bg: #0a0b0d;
            --surface: #16181d;
            --accent: #00f2ff;
            --text: #ffffff;
            --btn-num: #22252c;
            --btn-fn: #1c1f26;
            --btn-op: #2d313a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .calc-container {
            width: 420px;
            background: var(--surface);
            padding: 30px;
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 20px rgba(0,242,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Subtle Aethercore Branding */
        .branding {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .branding h1 {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin: 0;
        }

        .status-led {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }

        .screen-area {
            background: #000;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #history {
            display: block;
            height: 20px;
            color: #555;
            text-align: right;
            font-size: 14px;
            font-family: 'Consolas', monospace;
            overflow: hidden;
        }

        #display {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 32px;
            text-align: right;
            font-family: 'Consolas', monospace;
            outline: none;
            margin-top: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 12px;
            background: var(--btn-num);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            background: #323741;
            transform: translateY(-2px);
        }

        button:active { transform: translateY(1px); }

        .fn { background: var(--btn-fn); color: #888; }
        .op { background: var(--btn-op); color: var(--accent); }
        .ac { color: #ff4d4d; }
        .exe { 
            background: linear-gradient(135deg, #00d2ff 0%, #00f2ff 100%);
            color: #000;
            grid-column: span 2;
        }

        .mode-toggle {
            font-size: 9px;
            color: #444;
            text-align: center;
            margin-top: 15px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="branding">
        <h1>Aethercore Interactive</h1>
        <div class="status-led"></div>
    </div>

    <div class="screen-area">
        <span id="history"></span>
        <input type="text" id="display" value="0" readonly>
    </div>

    <div class="grid">
        <button class="fn" onclick="input('sin(')">SIN</button>
        <button class="fn" onclick="input('cos(')">COS</button>
        <button class="fn" onclick="input('tan(')">TAN</button>
        <button class="fn" onclick="input('log(')">LOG</button>
        <button class="fn" onclick="input('ln(')">LN</button>

        <button class="fn" onclick="input('asin(')">ASN</button>
        <button class="fn" onclick="input('acos(')">ACS</button>
        <button class="fn" onclick="input('atan(')">ATN</button>
        <button class="fn" onclick="input('sqrt(')">SQRT</button>
        <button class="fn" onclick="input('^')">POW</button>

        <button class="ac" onclick="clearAll()">AC</button>
        <button class="op" onclick="backspace()">DEL</button>
        <button class="op" onclick="input('(')">(</button>
        <button class="op" onclick="input(')')">)</button>
        <button class="op" onclick="input('/')">÷</button>

        <button onclick="input('7')">7</button>
        <button onclick="input('8')">8</button>
        <button onclick="input('9')">9</button>
        <button class="op" onclick="input('*')">×</button>
        <button class="fn" onclick="input('PI')">π</button>

        <button onclick="input('4')">4</button>
        <button onclick="input('5')">5</button>
        <button onclick="input('6')">6</button>
        <button class="op" onclick="input('-')">-</button>
        <button class="fn" onclick="input('e')">e</button>

        <button onclick="input('1')">1</button>
        <button onclick="input('2')">2</button>
        <button onclick="input('3')">3</button>
        <button class="op" onclick="input('+')">+</button>
        <button class="fn" onclick="input('!')">x!</button>

        <button onclick="input('0')">0</button>
        <button onclick="input('.')">.</button>
        <button onclick="input('mod')">MOD</button>
        <button class="exe" onclick="solve()">EXECUTE</button>
    </div>

    <div class="mode-toggle">CORE VERSION: 4.0.2 // RADIAN MODE ACTIVE</div>
</div>

<script>
    const display = document.getElementById('display');
    const history = document.getElementById('history');
    let isNewCalculation = false;

    function input(val) {
        if (display.value === '0' || isNewCalculation) {
            display.value = val;
            isNewCalculation = false;
        } else {
            display.value += val;
        }
    }

    function clearAll() {
        display.value = '0';
        history.innerText = '';
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
        if (display.value === '') display.value = '0';
    }

    function solve() {
        try {
            let expr = display.value;
            // Converting display symbols to mathjs symbols
            let mathExpr = expr.replace(/×/g, '*').replace(/÷/g, '/');
            
            const result = math.evaluate(mathExpr);
            
            history.innerText = expr + ' =';
            display.value = math.format(result, { precision: 14 });
            isNewCalculation = true;
        } catch (err) {
            display.value = "SYNTAX ERROR";
            setTimeout(clearAll, 1500);
        }
    }

    // Keyboard support for professional use
    document.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') input(e.key);
        if (e.key === '+') input('+');
        if (e.key === '-') input('-');
        if (e.key === '*') input('*');
        if (e.key === '/') input('/');
        if (e.key === 'Enter') solve();
        if (e.key === 'Backspace') backspace();
        if (e.key === 'Escape') clearAll();
    });
</script>

</body>
</html>
