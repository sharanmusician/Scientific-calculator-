<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethercore | Precision Calculator</title>
    <style>
        :root {
            --bg-grad: radial-gradient(circle at center, #1e2024 0%, #0f1012 100%);
            --panel-bg: #25282e;
            --display-bg: #141619;
            --accent-blue: #409eff;
            --text-main: #e0e0e0;
            --text-dim: #6c757d;
            --btn-hover: #32363d;
        }

        body {
            background: var(--bg-grad);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
        }

        /* Branding Style: Subtle & Premium */
        .brand-header {
            text-align: left;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .brand-header h1 {
            font-size: 0.75rem;
            letter-spacing: 0.25rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 0;
            font-weight: 400;
            opacity: 0.7;
        }

        .brand-header span {
            color: var(--accent-blue);
            font-weight: 700;
        }

        .calculator {
            background: var(--panel-bg);
            padding: 28px;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
            width: 380px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .display-container {
            background: var(--display-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .display {
            width: 100%;
            background: transparent;
            border: none;
            text-align: right;
            color: var(--accent-blue);
            font-size: 2rem;
            font-family: 'Consolas', monospace;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        button {
            height: 52px;
            border: none;
            border-radius: 10px;
            background: #2e323a;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #1a1c20;
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .operator { color: var(--accent-blue); background: #2a313d; }
        .function { color: #9ba3af; font-size: 0.8rem; background: #282c34; }
        .equals { background: var(--accent-blue); color: white; box-shadow: 0 4px 0 #286cb0; }
        .clear { color: #ff6b6b; }

        .footer-tag {
            margin-top: 20px;
            font-size: 0.6rem;
            text-align: center;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="brand-header">
        <h1>Aethercore <span>Interactive</span></h1>
    </div>

    <div class="display-container">
        <input type="text" id="result" class="display" readonly value="0">
    </div>
    
    <div class="buttons">
        <button class="function" onclick="push('Math.sin(')">SIN</button>
        <button class="function" onclick="push('Math.cos(')">COS</button>
        <button class="function" onclick="push('Math.tan(')">TAN</button>
        <button class="function" onclick="push('Math.log10(')">LOG</button>
        <button class="function" onclick="push('Math.log(')">LN</button>

        <button class="function" onclick="push('Math.PI')">π</button>
        <button class="function" onclick="push('Math.E')">e</button>
        <button class="function" onclick="push('**')">^</button>
        <button class="function" onclick="push('Math.sqrt(')">√</button>
        <button class="function" onclick="factorial()">x!</button>

        <button class="clear" onclick="clearDisplay()">AC</button>
        <button onclick="backspace()">DEL</button>
        <button onclick="push('(')">(</button>
        <button onclick="push(')')">)</button>
        <button class="operator" onclick="push('/')">÷</button>

        <button onclick="push('7')">7</button>
        <button onclick="push('8')">8</button>
        <button onclick="push('9')">9</button>
        <button class="operator" onclick="push('*')">×</button>
        <button class="function" onclick="push('Math.asin(')">ASIN</button>

        <button onclick="push('4')">4</button>
        <button onclick="push('5')">5</button>
        <button onclick="push('6')">6</button>
        <button class="operator" onclick="push('-')">−</button>
        <button class="function" onclick="push('Math.acos(')">ACOS</button>

        <button onclick="push('1')">1</button>
        <button onclick="push('2')">2</button>
        <button onclick="push('3')">3</button>
        <button class="operator" onclick="push('+')">+</button>
        <button class="function" onclick="push('Math.atan(')">ATAN</button>

        <button onclick="push('0')">0</button>
        <button onclick="push('.')">.</button>
        <button onclick="push('Math.exp(')">EXP</button>
        <button class="equals" onclick="calculate()" style="grid-column: span 2;">EXE</button>
    </div>

    <div class="footer-tag">Industrial Grade Core v4.2</div>
</div>

<script>
    const display = document.getElementById('result');

    function push(val) {
        if (display.value === '0') display.value = '';
        display.value += val;
    }

    function clearDisplay() {
        display.value = '0';
    }

    function backspace() {
        display.value = display.value.length > 1 ? display.value.slice(0, -1) : '0';
    }

    function calculate() {
        try {
            // Evaluates the string as JS math
            let result = eval(display.value);
            // Limit precision to 8 decimal places for professional look
            display.value = Number.isInteger(result) ? result : parseFloat(result.toFixed(8));
        } catch (e) {
            display.value = "SYNTAX ERROR";
            setTimeout(clearDisplay, 1500);
        }
    }

    function factorial() {
        let n = parseInt(display.value);
        if (n < 0) return display.value = "NAN ERROR";
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        display.value = res;
    }
</script>

</body>
</html>
