<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethercore Apex-991 | Engineering Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --case: #2c2e30;
            --lcd: #9db299;
            --btn-num: #efefef;
            --btn-dark: #3a3a3a;
            --btn-action: #d35400;
            --shift: #f1c40f;
            --alpha: #e74c3c;
        }

        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Consolas', monospace;
        }

        .calculator {
            background: var(--case);
            width: 440px;
            padding: 30px;
            border-radius: 25px 25px 70px 70px;
            box-shadow: 0 25px 0 #111, 0 50px 100px rgba(0,0,0,0.8);
        }

        /* The Screen */
        .screen-container {
            background: var(--lcd);
            height: 120px;
            border: 6px solid #1a1a1a;
            border-radius: 8px;
            padding: 10px;
            color: #1a1a1a;
            margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        #indicators { font-size: 11px; font-weight: bold; height: 15px; letter-spacing: 2px; }
        #input-flow { font-size: 22px; height: 45px; overflow-x: auto; white-space: nowrap; margin-top: 5px; }
        #output-flow { font-size: 32px; text-align: right; font-weight: bold; }

        /* The Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .btn-box { position: relative; padding-top: 15px; }
        .label-s { position: absolute; top: 0; left: 0; color: var(--shift); font-size: 8px; font-weight: bold; width: 50%; }
        .label-a { position: absolute; top: 0; right: 0; color: var(--alpha); font-size: 8px; font-weight: bold; width: 50%; text-align: right; }

        button {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #000;
            font-size: 11px;
            transition: 0.1s;
        }

        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
        
        .num { background: var(--btn-num); color: #222; font-size: 18px; height: 50px; }
        .fn { background: var(--btn-dark); color: #fff; }
        .orange { background: var(--btn-action); color: #fff; height: 50px; }
        .exec { background: #fff; color: #000; grid-column: span 2; height: 50px; font-size: 18px; }

        /* Branding */
        .brand { color: #fff; text-align: left; margin-bottom: 15px; border-left: 4px solid var(--alpha); padding-left: 10px; }
        .brand h1 { margin: 0; font-size: 16px; letter-spacing: 3px; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="brand">
        <h1>AETHERCORE INTERACTIVE</h1>
        <div style="font-size: 9px; opacity: 0.6;">SUPER-SCIENTIFIC OS v9.0</div>
    </div>

    <div class="screen-container">
        <div id="indicators">D&nbsp;&nbsp;MATH</div>
        <div id="input-flow"></div>
        <div id="output-flow">0</div>
    </div>

    <div class="buttons">
        <div class="btn-box"><button class="fn" onclick="toggleShift()">SHIFT</button></div>
        <div class="btn-box"><button class="fn" style="color:var(--alpha)">ALPHA</button></div>
        <div class="btn-box"><button class="fn">OPTN</button></div>
        <div class="btn-box"><button class="fn">CALC</button></div>
        <div class="btn-box"><button class="fn" onclick="backspace()">DEL</button></div>
        <div class="btn-box"><button class="fn" onclick="clearAll()" style="color:var(--btn-action)">AC</button></div>

        <div class="btn-box"><span class="label-s">x!</span><button class="fn" onclick="add('^-1')">x⁻¹</button></div>
        <div class="btn-box"><span class="label-s">nCr</span><button class="fn" onclick="add('/')">□/□</button></div>
        <div class="btn-box"><span class="label-s">∛</span><button class="fn" onclick="add('sqrt(')">√</button></div>
        <div class="btn-box"><span class="label-s">x³</span><button class="fn" onclick="add('^2')">x²</button></div>
        <div class="btn-box"><span class="label-s">10ˣ</span><button class="fn" onclick="add('^')">xʸ</button></div>
        <div class="btn-box"><span class="label-s">eˣ</span><button class="fn" onclick="add('log10(')">log</button></div>

        <div class="btn-box"><span class="label-s">i</span><button class="fn" onclick="add('log(')">ln</button></div>
        <div class="btn-box"><span class="label-s">∠</span><button class="fn" onclick="add('(-)')">(-)</button></div>
        <div class="btn-box"><span class="label-s">←</span><button class="fn" onclick="add('deg')">.,,,</button></div>
        <div class="btn-box"><span class="label-s">sin⁻¹</span><button class="fn" onclick="add('sin(')">sin</button></div>
        <div class="btn-box"><span class="label-s">cos⁻¹</span><button class="fn" onclick="add('cos(')">cos</button></div>
        <div class="btn-box"><span class="label-s">tan⁻¹</span><button class="fn" onclick="add('tan(')">tan</button></div>

        <div class="btn-box"><span class="label-a">A</span><button class="fn">STO</button></div>
        <div class="btn-box"><span class="label-a">B</span><button class="fn">ENG</button></div>
        <div class="btn-box"><span class="label-a">C</span><button class="fn" onclick="add('(')">(</button></div>
        <div class="btn-box"><span class="label-a">D</span><button class="fn" onclick="add(')')">)</button></div>
        <div class="btn-box"><span class="label-a">E</span><button class="fn" onclick="fractionToggle()">S⇔D</button></div>
        <div class="btn-box"><span class="label-a">F</span><button class="fn" onclick="add('M+')">M+</button></div>

        <button class="num" onclick="add('7')">7</button>
        <button class="num" onclick="add('8')">8</button>
        <button class="num" onclick="add('9')">9</button>
        <button class="orange" onclick="backspace()">DEL</button>
        <button class="orange" onclick="clearAll()">AC</button>
        <button class="fn" onclick="add('nCr(')">nCr</button>

        <button class="num" onclick="add('4')">4</button>
        <button class="num" onclick="add('5')">5</button>
        <button class="num" onclick="add('6')">6</button>
        <button class="num" onclick="add('*')">×</button>
        <button class="num" onclick="add('/')">÷</button>
        <button class="fn" onclick="add('nPr(')">nPr</button>

        <button class="num" onclick="add('1')">1</button>
        <button class="num" onclick="add('2')">2</button>
        <button class="num" onclick="add('3')">3</button>
        <button class="num" onclick="add('+')">+</button>
        <button class="num" onclick="add('-')">−</button>
        <button class="fn" onclick="add('mod')">Pol</button>

        <button class="num" onclick="add('0')">0</button>
        <button class="num" onclick="add('.')">.</button>
        <button class="num" onclick="add('*10^')">×10ˣ</button>
        <button class="num" onclick="add('Ans')">Ans</button>
        <button class="exec" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const inputArea = document.getElementById('input-flow');
    const outputArea = document.getElementById('output-flow');
    const indicator = document.getElementById('indicators');
    let shift = false;
    let lastAns = 0;

    function toggleShift() {
        shift = !shift;
        indicator.innerText = shift ? "S &nbsp;&nbsp; MATH" : "D &nbsp;&nbsp; MATH";
        indicator.style.color = shift ? "var(--shift)" : "#1a1a1a";
    }

    function add(val) {
        if (shift) {
            // Mapping real Shift-Key jobs
            if (val === 'sin(') val = 'asin(';
            else if (val === 'cos(') val = 'acos(';
            else if (val === 'tan(') val = 'atan(';
            else if (val === 'sqrt(') val = 'cbrt(';
            else if (val === '^-1') val = '!';
            
            toggleShift(); // Reset shift after use
        }
        inputArea.innerText += val;
    }

    function clearAll() {
        inputArea.innerText = '';
        outputArea.innerText = '0';
    }

    function backspace() {
        inputArea.innerText = inputArea.innerText.slice(0, -1);
    }

    function calculate() {
        try {
            let expression = inputArea.innerText;
            // Handle visual symbols to math symbols
            expression = expression.replace(/×/g, '*').replace(/÷/g, '/');
            expression = expression.replace(/Ans/g, lastAns);
            
            // MATH.JS EVALUATION
            const result = math.evaluate(expression);
            lastAns = result;
            
            outputArea.innerText = math.format(result, { precision: 10 });
        } catch (e) {
            outputArea.innerText = "Syntax ERROR";
        }
    }
</script>
</body>
</html>
