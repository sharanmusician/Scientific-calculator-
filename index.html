<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethercore | FX-PRO Scientific</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --c-body: #2c2e31;
            --c-screen: #9fb3a0; /* Classic Casio LCD Tint */
            --c-btn-num: #e5e5e5;
            --c-btn-dark: #3a3d42;
            --c-btn-accent: #d35400; /* AC/DEL Button */
            --c-shift: #f1c40f;
            --c-alpha: #e74c3c;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            margin: 0;
        }

        .calculator {
            background: var(--c-body);
            width: 380px;
            padding: 25px;
            border-radius: 20px 20px 50px 50px;
            box-shadow: 0 30px 0 #151515, 0 50px 100px rgba(0,0,0,0.7);
            position: relative;
        }

        /* Branding */
        .brand-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            margin-bottom: 10px;
        }
        .brand-zone h2 { font-size: 14px; margin: 0; letter-spacing: 1px; opacity: 0.8; }
        .brand-zone .model { font-size: 10px; color: #aaa; }

        /* LCD Screen */
        .screen {
            background: var(--c-screen);
            height: 100px;
            border-radius: 5px;
            border: 4px solid #111;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
            padding: 10px;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: 'Courier New', Courier, monospace;
        }

        #input-line { font-size: 18px; word-wrap: break-word; }
        #output-line { font-size: 26px; text-align: right; font-weight: bold; }

        /* Button Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        button {
            height: 38px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 3px 0 #111;
            transition: 0.1s;
            position: relative;
        }

        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #111; }

        /* Color Coding */
        .num { background: var(--c-btn-num); color: #222; font-size: 16px; }
        .fn { background: var(--c-btn-dark); color: #fff; font-size: 10px; }
        .action { background: var(--c-btn-accent); color: #fff; }
        .special { background: #555; color: #fff; }

        /* Label styling (the text above buttons) */
        .btn-wrap { position: relative; padding-top: 14px; }
        .shift-label {
            position: absolute; top: 0; left: 0;
            color: var(--c-shift); font-size: 9px; width: 100%; text-align: center;
        }

        .row-main { grid-column: span 1; height: 45px; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="brand-zone">
        <h2>AETHERCORE <span>INTERACTIVE</span></h2>
        <span class="model">PRO-991EX</span>
    </div>

    <div class="screen">
        <div id="input-line"></div>
        <div id="output-line">0</div>
    </div>

    <div class="grid">
        <button class="special" onclick="toggleShift()" id="shift-btn">SHIFT</button>
        <button class="special" style="color:var(--c-alpha)">ALPHA</button>
        <button class="special">OPTN</button>
        <button class="special" onclick="clearScreen()" style="color:var(--c-btn-accent)">AC</button>
        <button class="special" onclick="backspace()">DEL</button>

        <div class="btn-wrap"><span class="shift-label">sin⁻¹</span><button class="fn" onclick="add('sin(')">sin</button></div>
        <div class="btn-wrap"><span class="shift-label">cos⁻¹</span><button class="fn" onclick="add('cos(')">cos</button></div>
        <div class="btn-wrap"><span class="shift-label">tan⁻¹</span><button class="fn" onclick="add('tan(')">tan</button></div>
        <div class="btn-wrap"><span class="shift-label">abs</span><button class="fn" onclick="add('abs(')">abs</button></div>
        <div class="btn-wrap"><span class="shift-label">logₐ</span><button class="fn" onclick="add('log(')">log</button></div>

        <div class="btn-wrap"><span class="shift-label">√</span><button class="fn" onclick="add('sqrt(')">√</button></div>
        <div class="btn-wrap"><span class="shift-label">x³</span><button class="fn" onclick="add('^2')">x²</button></div>
        <div class="btn-wrap"><span class="shift-label">10ˣ</span><button class="fn" onclick="add('^')">xʸ</button></div>
        <div class="btn-wrap"><span class="shift-label">eˣ</span><button class="fn" onclick="add('log(')">ln</button></div>
        <div class="btn-wrap"><span class="shift-label">%</span><button class="fn" onclick="add('(')">(</button></div>

        <button class="num row-main" onclick="add('7')">7</button>
        <button class="num row-main" onclick="add('8')">8</button>
        <button class="num row-main" onclick="add('9')">9</button>
        <button class="fn row-main" onclick="add('/')">÷</button>
        <button class="fn row-main" onclick="add(')')">)</button>

        <button class="num row-main" onclick="add('4')">4</button>
        <button class="num row-main" onclick="add('5')">5</button>
        <button class="num row-main" onclick="add('6')">6</button>
        <button class="fn row-main" onclick="add('*')">×</button>
        <button class="fn row-main" onclick="add('!')">x!</button>

        <button class="num row-main" onclick="add('1')">1</button>
        <button class="num row-main" onclick="add('2')">2</button>
        <button class="num row-main" onclick="add('3')">3</button>
        <button class="fn row-main" onclick="add('+')">+</button>
        <button class="fn row-main" onclick="add('-')">−</button>

        <button class="num row-main" onclick="add('0')">0</button>
        <button class="num row-main" onclick="add('.')">.</button>
        <button class="num row-main" onclick="add(' * 10^')">x10ˣ</button>
        <button class="fn row-main" onclick="add('Ans')">Ans</button>
        <button class="num row-main" onclick="calculate()" style="background:var(--c-btn-num);">=</button>
    </div>
</div>

<script>
    const inputLine = document.getElementById('input-line');
    const outputLine = document.getElementById('output-line');
    let lastAns = 0;
    let shiftActive = false;

    function toggleShift() {
        shiftActive = !shiftActive;
        document.getElementById('shift-btn').style.background = shiftActive ? '#f1c40f' : '#555';
        document.getElementById('shift-btn').style.color = shiftActive ? '#000' : '#fff';
    }

    function add(val) {
        // Simple logic for Shift functions
        if(shiftActive) {
            if(val === 'sin(') val = 'asin(';
            if(val === 'cos(') val = 'acos(';
            if(val === 'tan(') val = 'atan(';
            shiftActive = false;
            document.getElementById('shift-btn').style.background = '#555';
        }
        inputLine.innerText += val;
    }

    function clearScreen() {
        inputLine.innerText = '';
        outputLine.innerText = '0';
    }

    function backspace() {
        inputLine.innerText = inputLine.innerText.slice(0, -1);
    }

    function calculate() {
        try {
            let expression = inputLine.innerText;
            expression = expression.replace(/Ans/g, lastAns);
            
            // Math.js evaluation
            const result = math.evaluate(expression);
            
            lastAns = result;
            outputLine.innerText = math.format(result, { precision: 10 });
        } catch (e) {
            outputLine.innerText = "Syntax ERROR";
        }
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
        if (!isNaN(e.key)) add(e.key);
        if (['+', '-', '*', '/'].includes(e.key)) add(e.key);
        if (e.key === 'Enter') calculate();
        if (e.key === 'Backspace') backspace();
    });
</script>

</body>
</html>
