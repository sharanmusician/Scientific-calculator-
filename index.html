<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethercore Apex-991 | Engineering Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --case: #2c2e30;
            --lcd: #9db299;
            --btn-num: #efefef;
            --btn-dark: #3a3a3a;
            --btn-action: #d35400;
            --shift: #f1c40f;
            --alpha: #e74c3c;
        }

        body { background: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Consolas', monospace; }
        
        .calculator {
            background: var(--case);
            width: 420px;
            padding: 25px;
            border-radius: 25px 25px 60px 60px;
            box-shadow: 0 20px 0 #111, 0 40px 80px rgba(0,0,0,0.8);
        }

        /* LCD Screen */
        .screen {
            background: var(--lcd);
            height: 110px;
            border: 5px solid #111;
            border-radius: 6px;
            padding: 10px;
            color: #1a1a1a;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        #line-in { font-size: 20px; height: 50px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid rgba(0,0,0,0.1); }
        #line-out { font-size: 30px; text-align: right; font-weight: bold; margin-top: 5px; }

        /* Branding */
        .brand { color: white; margin-bottom: 10px; font-weight: bold; border-left: 5px solid var(--alpha); padding-left: 10px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        
        .btn-w { position: relative; padding-top: 14px; }
        .s-lbl { position: absolute; top: 0; left: 2px; color: var(--shift); font-size: 8px; font-weight: bold; }
        .a-lbl { position: absolute; top: 0; right: 2px; color: var(--alpha); font-size: 8px; font-weight: bold; }

        button {
            width: 100%; height: 38px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
            box-shadow: 0 3px 0 #000; font-size: 11px; transition: 0.1s;
        }

        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
        
        .num { background: var(--btn-num); color: #222; font-size: 16px; height: 45px; }
        .fn { background: var(--btn-dark); color: #fff; }
        .act { background: var(--btn-action); color: #fff; height: 45px; }
        .eq { background: #fff; color: #000; grid-column: span 2; height: 45px; font-size: 18px; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="brand">AETHERCORE <span style="color:var(--alpha)">CLASSWIZ</span> <span style="font-size:10px; opacity:0.5; float:right;">PRO-991</span></div>
    
    <div class="screen">
        <div id="line-in"></div>
        <div id="line-out">0</div>
    </div>

    <div class="grid">
        <button class="fn" onclick="setMode('shift')" id="s-btn">SHIFT</button>
        <button class="fn" onclick="setMode('alpha')" id="a-btn" style="color:var(--alpha)">ALPHA</button>
        <button class="fn">OPTN</button>
        <button class="fn">CALC</button>
        <button class="fn" onclick="back()">DEL</button>
        <button class="fn" onclick="reset()" style="color:var(--btn-action)">AC</button>

        <div class="btn-w"><span class="s-lbl">x!</span><button class="fn" onclick="press('^-1')">x⁻¹</button></div>
        <div class="btn-w"><span class="s-lbl">nCr</span><button class="fn" onclick="press('/')">□/□</button></div>
        <div class="btn-w"><span class="s-lbl">∛</span><button class="fn" onclick="press('sqrt(')">√</button></div>
        <div class="btn-w"><span class="s-lbl">x³</span><button class="fn" onclick="press('^2')">x²</button></div>
        <div class="btn-w"><span class="s-lbl">10ˣ</span><button class="fn" onclick="press('^')">x□</button></div>
        <div class="btn-w"><span class="s-lbl">eˣ</span><button class="fn" onclick="press('log10(')">log</button></div>

        <div class="btn-w"><span class="s-lbl">i</span><button class="fn" onclick="press('log(')">ln</button></div>
        <div class="btn-w"><span class="s-lbl">∠</span><button class="fn" onclick="press('(-)')">(-)</button></div>
        <div class="btn-w"><span class="s-lbl">FACT</span><button class="fn" onclick="press('deg')">.,,,</button></div>
        <div class="btn-w"><span class="s-lbl">sin⁻¹</span><button class="fn" onclick="press('sin(')">sin</button></div>
        <div class="btn-w"><span class="s-lbl">cos⁻¹</span><button class="fn" onclick="press('cos(')">cos</button></div>
        <div class="btn-w"><span class="s-lbl">tan⁻¹</span><button class="fn" onclick="press('tan(')">tan</button></div>

        <div class="btn-w"><span class="a-lbl">A</span><button class="fn">STO</button></div>
        <div class="btn-w"><span class="a-lbl">B</span><button class="fn">ENG</button></div>
        <div class="btn-w"><span class="a-lbl">C</span><button class="fn" onclick="press('(')">(</button></div>
        <div class="btn-w"><span class="a-lbl">D</span><button class="fn" onclick="press(')')">)</button></div>
        <div class="btn-w"><span class="a-lbl">E</span><button class="fn" onclick="press(';')">S⇔D</button></div>
        <div class="btn-w"><span class="a-lbl">F</span><button class="fn" onclick="press('M+')">M+</button></div>

        <button class="num" onclick="press('7')">7</button>
        <button class="num" onclick="press('8')">8</button>
        <button class="num" onclick="press('9')">9</button>
        <button class="act" onclick="back()">DEL</button>
        <button class="act" onclick="reset()">AC</button>
        <button class="fn" onclick="press('nPr(')">nPr</button>

        <button class="num" onclick="press('4')">4</button>
        <button class="num" onclick="press('5')">5</button>
        <button class="num" onclick="press('6')">6</button>
        <button class="num" onclick="press('*')">×</button>
        <button class="num" onclick="press('/')">÷</button>
        <button class="fn" onclick="press('nCr(')">nCr</button>

        <button class="num" onclick="press('1')">1</button>
        <button class="num" onclick="press('2')">2</button>
        <button class="num" onclick="press('3')">3</button>
        <button class="num" onclick="press('+')">+</button>
        <button class="num" onclick="press('-')">−</button>
        <button class="fn" onclick="press('pi')">π</button>

        <button class="num" onclick="press('0')">0</button>
        <button class="num" onclick="press('.')">.</button>
        <button class="num" onclick="press('*10^')">×10ˣ</button>
        <button class="num" onclick="press('Ans')">Ans</button>
        <button class="eq" onclick="solve()">=</button>
    </div>
</div>

<script>
    const input = document.getElementById('line-in');
    const output = document.getElementById('line-out');
    let state = 'normal'; // 'normal', 'shift', 'alpha'
    let lastAns = 0;

    function setMode(m) {
        state = (state === m) ? 'normal' : m;
        updateUI();
    }

    function updateUI() {
        document.getElementById('s-btn').style.background = (state === 'shift') ? 'var(--shift)' : 'var(--btn-dark)';
        document.getElementById('a-btn').style.background = (state === 'alpha') ? 'var(--alpha)' : 'var(--btn-dark)';
    }

    function press(val) {
        let finalVal = val;
        
        if (state === 'shift') {
            // THE ACTUAL CASIO SHIFT LOGIC
            const shiftMap = {
                'sin(': 'asin(',
                'cos(': 'acos(',
                'tan(': 'atan(',
                'sqrt(': 'cbrt(',
                '^-1': '!',
                'log10(': '10^'
            };
            finalVal = shiftMap[val] || val;
            state = 'normal';
        }
        
        input.innerText += finalVal;
        updateUI();
    }

    function reset() { input.innerText = ''; output.innerText = '0'; }
    function back() { input.innerText = input.innerText.slice(0, -1); }

    function solve() {
        try {
            let formula = input.innerText;
            formula = formula.replace(/×/g, '*').replace(/÷/g, '/');
            formula = formula.replace(/Ans/g, lastAns);
            
            const result = math.evaluate(formula);
            lastAns = result;
            output.innerText = math.format(result, { precision: 10 });
        } catch (e) {
            output.innerText = "Syntax ERROR";
        }
    }

    // Keyboard support for all keys
    document.addEventListener('keydown', (e) => {
        if (!isNaN(e.key)) press(e.key);
        if (['+', '-', '*', '/'].includes(e.key)) press(e.key);
        if (e.key === 'Enter') solve();
        if (e.key === 'Backspace') back();
    });
</script>
</body>
</html>
